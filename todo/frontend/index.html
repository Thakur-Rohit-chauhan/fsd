<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="card">
      <h1>Admin Login</h1>
      <form id="adminLoginForm">
        <input id="admin_username" type="text" placeholder="Username" required minlength="3" />
        <input id="admin_password" type="password" placeholder="Password" required minlength="6" />
        <button type="submit">Login as Admin</button>
      </form>

      <form id="adminRegisterForm">
        <h2>Admin Register</h2>
        <input id="admin_reg_username" type="text" placeholder="Username" required minlength="3" />
        <input id="admin_reg_password" type="password" placeholder="Password" required minlength="6" />
        <input id="admin_reg_confirm" type="password" placeholder="Confirm Password" required minlength="6" />
        <button type="submit">Register Admin</button>
      </form>

      <a class="link" href="./student-login.html">Go to Student Login</a>
      <p id="message" class="message"></p>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>

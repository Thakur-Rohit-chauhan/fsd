<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Login</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="card">
      <h1>Student Login</h1>
      <form id="studentLoginForm">
        <input id="student_username" type="text" placeholder="Username" required minlength="3" />
        <input id="student_password" type="password" placeholder="Password" required minlength="6" />
        <button type="submit">Login as Student</button>
      </form>

      <form id="studentRegisterForm">
        <h2>Student Register</h2>
        <input id="student_reg_username" type="text" placeholder="Username" required minlength="3" />
        <input id="student_reg_password" type="password" placeholder="Password" required minlength="6" />
        <input id="student_reg_confirm" type="password" placeholder="Confirm Password" required minlength="6" />
        <button type="submit">Register Student</button>
      </form>

      <a class="link" href="./index.html">Go to Admin Login</a>
      <p id="message" class="message"></p>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
